site_name: tess
site_description: Performance-first C++20 tile and path simulation
site_url: https://tess.owx.dev/
repo_url: https://github.com/kindjie/tess
repo_name: kindjie/tess
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: build/site

theme:
  name: material
  logo: assets/tess-symbol-header.svg
  favicon: assets/tess-symbol.svg
  # No web-font fetch: headings load a vendored face via extra.css; body
  # text uses the system stack.
  font: false
  features:
    - content.code.copy
    - navigation.footer
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Installation: packaging.md
  - Examples: examples.md
  - API reference: https://tess.owx.dev/api/
  - Concepts:
      - Overview: architecture/README.md
      - Shapes: architecture/shape.md
      - Storage: architecture/storage.md
      - Pathfinding: architecture/path.md
      - Topology: architecture/topology.md
      - Queued operations: architecture/queued-operations.md
      - Simulation and scheduling: architecture/simulation.md
      - ECS integration: architecture/ecs.md
      - Diagnostics: architecture/diagnostics.md
  - Performance: performance.md
  - Support: support.md

exclude_docs: |
  /README.md
  /api-main.md
  /assets/fonts/README.md
  /dependencies.md
  /git-hooks.md
  /history.md
  /hosting.md
  /style.md
  decisions/
  doxygen-awesome/
  planning/
  tdd/

copyright: Copyright &copy; tess contributors
