<svg xmlns="http://www.w3.org/2000/svg"
     width="52"
     height="52"
     viewBox="0 0 104 104"
     role="img"
     aria-labelledby="title description">
  <title id="title">Tess project symbol for colored headers</title>
  <desc id="description">
    Four violet tiles and one raised amber tile on a dark rounded square.
  </desc>

  <defs>
    <linearGradient id="violet"
                    x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7f6dbc"/>
      <stop offset="1" stop-color="#705eb1"/>
    </linearGradient>
    <linearGradient id="amber"
                    x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7bd5f"/>
      <stop offset="1" stop-color="#efaa48"/>
    </linearGradient>
  </defs>

  <!-- The plate maintains a 3:1 boundary on the Material theme header. -->
  <rect x="1" y="1" width="102" height="102" rx="20"
        fill="#17131f"/>

  <g transform="translate(10 10) scale(.8)">
    <!-- Raised destination tile. -->
    <rect x="55" y="2" width="30" height="30" rx="4"
          fill="url(#amber)"/>

    <!-- Compact 2-by-2 tile field. -->
    <g fill="url(#violet)">
      <rect x="20" y="35" width="30" height="30" rx="4"/>
      <rect x="55" y="35" width="30" height="30" rx="4"/>
      <rect x="20" y="69" width="30" height="30" rx="4"/>
      <rect x="55" y="69" width="30" height="30" rx="4"/>
    </g>
  </g>
</svg>
