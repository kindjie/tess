name: Documentation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install documentation tools
        run: |
          python -m venv .venv-docs
          .venv-docs/bin/python -m pip install \
            --require-hashes \
            --requirement requirements-docs.txt

      - name: Verify source-backed documentation
        run: |
          python3 tools/check_doc_snippets.py
          python3 tools/check_doc_versions.py

      - name: Build site
        run: .venv-docs/bin/mkdocs build --strict

      - name: Build WebAssembly example
        env:
          EMSCRIPTEN_IMAGE: >-
            emscripten/emsdk:6.0.3@sha256:bb0910e6a18bb9bd7cb31ae4ed40f9073148b78cb2cdb8ea8676454e0d85425c
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/src" \
            --workdir /src \
            "$EMSCRIPTEN_IMAGE" \
            bash tools/build_web_demo.sh build/site/demo

      - name: Check generated documentation links
        run: python3 tools/check_docs_links.py build/site

      - name: Smoke-test WebAssembly in Chrome
        run: |
          python3 -m http.server 8000 --directory build/site &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:8000/demo/ >/dev/null && break
            sleep 0.25
          done
          google-chrome \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --virtual-time-budget=5000 \
            --dump-dom \
            http://127.0.0.1:8000/demo/ >build/web-demo-dom.html
          grep -q 'data-tess-demo="ready"' build/web-demo-dom.html
          grep -q '>Route found<' build/web-demo-dom.html

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/site

  deploy:
    name: Deploy documentation
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
