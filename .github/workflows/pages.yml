name: Documentation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded pull-request builds, but never an in-flight main-branch
# deployment.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    env:
      DOXYGEN_VERSION: 1.17.0
      DOXYGEN_SHA256: >-
        75419ef4f446fc1c24ef12514b574e66e898ee6f527c6ae2ad84f91a905823c2
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install documentation tools
        run: |
          python -m venv .venv-docs
          .venv-docs/bin/python -m pip install \
            --require-hashes \
            --requirement requirements-docs.txt

      - name: Install Doxygen
        run: |
          archive="$RUNNER_TEMP/doxygen.tar.gz"
          install_dir="$RUNNER_TEMP/doxygen"
          release="Release_${DOXYGEN_VERSION//./_}"
          asset="doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          url="https://github.com/doxygen/doxygen/releases/download"
          curl --fail --location --retry 3 \
            --output "$archive" \
            "$url/$release/$asset"
          echo "$DOXYGEN_SHA256  $archive" | sha256sum --check --strict
          mkdir -p "$install_dir"
          tar --extract --gzip --file "$archive" \
            --directory "$install_dir" --strip-components=1
          installed_version=$("$install_dir/bin/doxygen" --version)
          echo "Installed Doxygen $installed_version"
          test "${installed_version%% *}" = "$DOXYGEN_VERSION"
          echo "$install_dir/bin" >>"$GITHUB_PATH"

      - name: Verify source-backed documentation
        run: |
          python3 tools/check_doc_snippets.py
          python3 tools/check_doc_versions.py

      - name: Build site
        run: .venv-docs/bin/mkdocs build --strict

      - name: Build API reference
        run: |
          cmake -S . -B build/docs-api \
            -DCMAKE_BUILD_TYPE=Release \
            -DTESS_BUILD_TESTING=OFF \
            -DTESS_BUILD_EXAMPLES=OFF \
            -DTESS_BUILD_BENCHMARKS=OFF \
            -DTESS_BUILD_DOCS=ON \
            -DTESS_ENABLE_ENTT=OFF
          cmake --build build/docs-api --target tess_docs

      - name: Build WebAssembly example
        env:
          EMSCRIPTEN_IMAGE: >-
            emscripten/emsdk:6.0.3@sha256:bb0910e6a18bb9bd7cb31ae4ed40f9073148b78cb2cdb8ea8676454e0d85425c
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/src" \
            --workdir /src \
            "$EMSCRIPTEN_IMAGE" \
            bash tools/build_web_demo.sh build/site/demo

      - name: Assemble Pages artifact
        run: cp -R build/docs-api/docs/html build/site/api

      - name: Check generated documentation links
        run: |
          # Doxygen 1.17.0 emits these quick-index links without anchors. Keep
          # each exception target-specific so every other missing anchor fails.
          python3 tools/check_docs_links.py build/site \
            --ignore-missing-anchor api/functions_vars.html#index_b \
            --ignore-missing-anchor api/functions_vars.html#index_n \
            --ignore-missing-anchor api/functions_func.html#index_~ \
            --ignore-missing-anchor api/functions_~.html#index_~

      - name: Smoke-test WebAssembly in Chrome
        run: |
          python3 -m http.server 8000 --directory build/site &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:8000/demo/ >/dev/null && break
            sleep 0.25
          done
          # Fail here, not at the DOM grep, if the server never came up.
          curl --fail --silent http://127.0.0.1:8000/demo/ >/dev/null
          google-chrome \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --virtual-time-budget=5000 \
            --dump-dom \
            http://127.0.0.1:8000/demo/ >build/web-demo-dom.html
          grep -q 'data-tess-demo="ready"' build/web-demo-dom.html
          grep -q '>Route found<' build/web-demo-dom.html
          google-chrome \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --virtual-time-budget=8000 \
            --dump-dom \
            http://127.0.0.1:8000/demo/colony/ >build/web-colony-dom.html
          grep -q 'data-tess-colony="ready"' build/web-colony-dom.html
          grep -q '>Colony running<' build/web-colony-dom.html
          # Chromium's webgpu-swiftshader test configuration forces a software
          # adapter and opts test-only WebGPU paths into this trusted smoke.
          # Poll DevTools in wall time: virtual time can race past asynchronous
          # GPU-process work and trigger the page's timeout before it completes.
          python3 tools/wait_for_browser_state.py \
            --browser google-chrome \
            --url http://127.0.0.1:8000/demo/webgpu/ \
            --dataset tessWebgpu \
            --expected ready \
            --timeout 20 \
            -- \
            --no-sandbox \
            --enable-unsafe-webgpu \
            --use-webgpu-adapter=swiftshader \
            --enable-dawn-features=allow_unsafe_apis \
            --disable-dawn-features=use_dxc \
            --enable-webgpu-developer-features \
            --use-gpu-in-tests \
            --enable-accelerated-2d-canvas

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/site

  deploy:
    name: Deploy documentation
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
