name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_CXX_COMPILER_LAUNCHER: ccache
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  dev:
    name: Dev Build And Tests
    runs-on: ubuntu-24.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-dev-${{ github.sha }}
          restore-keys: ccache-dev-

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
          ccache --version

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

      - name: Example smoke
        run: |
          ran=0
          for example in build/dev/examples/tess_*; do
            [ -x "$example" ] || continue
            echo "::group::$(basename "$example")"
            "$example"
            echo "::endgroup::"
            ran=$((ran + 1))
          done
          test "$ran" -ge 11  # every example runs; bump when adding one

      # Documented example output is copied from real program runs; drift
      # between the docs and the compiled quickstart fails the build.
      - name: Documentation example output
        run: >-
          python3 tools/check_doc_outputs.py
          examples/quickstart.cc=build/dev/examples/tess_quickstart

      - name: Install smoke
        run: tools/install_smoke.sh

      - name: FetchContent consumer smoke
        run: tools/fetchcontent_smoke.sh

  # Required GCC portability and warning-cleanliness gate: compile only.
  # GCC's stricter two-phase name lookup catches header portability breaks
  # that Clang and MSVC accept. Promoted after three consecutive green main
  # runs on 2026-07-12.
  gcc:
    name: GCC Compile
    runs-on: ubuntu-24.04
    env:
      CC: gcc
      CXX: g++
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-gcc-${{ github.sha }}
          restore-keys: ccache-gcc-

      - name: Show tool versions
        run: |
          cmake --version
          g++ --version

      - name: Configure
        run: cmake --preset dev-werror

      - name: Build
        run: cmake --build --preset dev-werror

  hooks-backstop:
    name: Hook Backstop Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install development tools
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install \
            --require-hashes \
            --requirement requirements-dev.txt
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          python --version
          pip --version
          clang-format --version

      - name: Repository hook checks
        run: python tools/git_hooks.py ci

      - name: Hook unit tests
        run: >-
          pytest
          tests/test_git_hooks.py
          tests/test_benchmark_tools.py
          tests/test_check_public_surface.py
          tests/test_check_public_docs.py
          tests/test_check_docs_links.py
          tests/test_cmake_compatibility.py
          tests/test_doc_outputs.py
          tests/test_doc_snippets.py
          tests/test_doc_versions.py
          tests/test_header_compile_cost.py
          tests/test_steamdeck_tools.py

      # Failing gate (promoted 2026-07-07 after a clean shake-out):
      # public symbols must be documented in a maintained architecture
      # doc and listed in docs/architecture/surface.json.
      - name: Public surface manifest
        run: python tools/check_public_surface.py

      # Every namespace-scope symbol in an installed API-bearing header must
      # carry a Doxygen comment.
      - name: Public API documentation
        run: python tools/check_public_docs.py

      # Markdown examples are copied from named regions in compiled sources.
      - name: Documentation snippets
        run: python tools/check_doc_snippets.py

      # Main documents unreleased development APIs while install examples may
      # also pin the latest release. Keep those two versions explicit.
      - name: Documentation versions
        run: python tools/check_doc_versions.py

  quality:
    name: Quality Gates (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev-werror
          - dev-asan
          - dev-tsan
          - dev-cppcheck
          - dev-clang-tidy
          - release
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.preset }}-

      - name: Install clang-tidy
        if: matrix.preset == 'dev-clang-tidy'
        run: |
          sudo apt-get update || true
          sudo apt-get install -y clang-tidy

      - name: Install cppcheck 2.21.0
        if: matrix.preset == 'dev-cppcheck'
        env:
          CPPCHECK_SHA256: >-
            f028ff75ca5372738f3737c8b3e8611426a6526b6aea2ef01301ab0f5902f044
        run: |
          archive="$RUNNER_TEMP/cppcheck-2.21.0.tar.gz"
          curl -fsSL \
            https://github.com/danmar/cppcheck/archive/refs/tags/2.21.0.tar.gz \
            -o "$archive"
          echo "$CPPCHECK_SHA256  $archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP"
          cmake \
            -S "$RUNNER_TEMP/cppcheck-2.21.0" \
            -B "$RUNNER_TEMP/cppcheck-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DUSE_MATCHCOMPILER=Off
          cmake --build "$RUNNER_TEMP/cppcheck-build" \
            --target cppcheck --parallel 2
          echo "$RUNNER_TEMP/cppcheck-build/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
          if command -v clang-tidy >/dev/null; then clang-tidy --version; fi
          if command -v cppcheck >/dev/null; then cppcheck --version; fi

      - name: Configure
        run: cmake --preset "${{ matrix.preset }}"

      - name: Build
        if: matrix.preset != 'dev-clang-tidy'
        run: cmake --build --preset "${{ matrix.preset }}"

      - name: Build clang-tidy with bounded parallelism
        if: matrix.preset == 'dev-clang-tidy'
        run: cmake --build --preset "${{ matrix.preset }}" --parallel 4

      - name: Test
        if: >-
          matrix.preset == 'dev-werror' ||
          matrix.preset == 'dev-asan' ||
          matrix.preset == 'dev-tsan' ||
          matrix.preset == 'release'
        run: ctest --preset "${{ matrix.preset }}"

  # No benchmark gates on macOS: bench/thresholds/*.json ceilings are
  # calibrated against the Linux ubuntu-24.04 runner family and would
  # misfire on Apple Silicon runners.
  macos:
    name: macOS Build And Tests (${{ matrix.preset }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev
          - dev-asan
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-macos-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-macos-${{ matrix.preset }}-

      - name: Install ccache
        run: brew install ccache

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
          ccache --version

      - name: Configure
        run: cmake --preset "${{ matrix.preset }}"

      - name: Build
        run: cmake --build --preset "${{ matrix.preset }}"

      - name: Test
        run: ctest --preset "${{ matrix.preset }}"

      - name: Install smoke
        if: matrix.preset == 'dev'
        run: tools/install_smoke.sh

  # The Visual Studio generator ignores compiler launchers, so the
  # workflow-level ccache env vars are inert here.
  windows:
    # Required gate; the windows-msvc preset treats project warnings as errors.
    name: Windows MSVC
    runs-on: windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Show tool versions
        run: cmake --version

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build
        run: cmake --build --preset windows-msvc

      - name: Test
        run: ctest --preset windows-msvc

      # Checked iterators allocate proxy state inside noexcept STL vector
      # constructors, so process-wide allocation rejection is unsafe in Debug.
      # Keep Debug's iterator checks, then exercise failure contracts in the
      # same toolchain's Release configuration.
      - name: Build allocation-failure tests without checked iterators
        run: >-
          cmake --build build/windows-msvc --config Release
          --target tess_allocation_counter_test tess_path_cache_test

      - name: Test allocation-failure contracts without checked iterators
        run: >-
          ctest --test-dir build/windows-msvc -C Release --output-on-failure
          --no-tests=error
          -R "TessAllocationCounter|StrongAllocation|FailedStore"

      - name: Install smoke
        shell: bash
        env:
          TESS_INSTALL_SMOKE_BUILD_DIR: >-
            ${{ github.workspace }}/build/windows-msvc
          TESS_INSTALL_SMOKE_CONFIG: Debug
        run: tools/install_smoke.sh

  bench:
    name: Benchmark Gates
    runs-on: ubuntu-24.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-bench-${{ github.sha }}
          restore-keys: ccache-bench-

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version

      - name: Configure
        run: cmake --preset bench

      - name: Build
        run: cmake --build --preset bench

      - name: Test
        run: ctest --preset bench

      - name: Key benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_key_thresholds

      - name: Storage benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_storage_thresholds

      - name: Block benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_block_thresholds

      - name: Queued benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_queued_thresholds

      - name: Path benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_path_thresholds

      - name: Topology benchmark thresholds
        run: >-
          cmake --build --preset bench --target
          tess_bench_topology_thresholds

      - name: Scheduler benchmark thresholds
        run: >-
          cmake --build --preset bench --target
          tess_bench_scheduler_thresholds

      - name: Residency benchmark thresholds
        run: >-
          cmake --build --preset bench --target
          tess_bench_residency_thresholds

      - name: Parallel benchmark thresholds
        run: >-
          cmake --build --preset bench --target
          tess_bench_parallel_thresholds

      - name: Ecs benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_ecs_thresholds

      - name: Render delta benchmark thresholds
        run: >-
          cmake --build --preset bench --target
          tess_bench_render_delta_thresholds

      - name: Fields benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_fields_thresholds

      - name: Diagnostics benchmark thresholds
        run: >-
          cmake --build --preset bench --target
          tess_bench_diagnostics_thresholds

      - name: Collect non-gating benchmark baselines
        if: github.ref == 'refs/heads/main'
        run: cmake --build --preset bench --target tess_bench_ci_baselines

      - name: Write benchmark artifact metadata
        if: github.ref == 'refs/heads/main'
        run: |
          tools/benchmark_artifact_metadata.py \
            --out build/bench/bench/ci-baselines/metadata.json

      - name: Upload benchmark baseline artifact
        if: github.ref == 'refs/heads/main'
        # upload-artifact v7.0.1.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-baselines-${{ github.run_id }}
          path: build/bench/bench/ci-baselines/*.json
          retention-days: 30

  # Stable ruleset target for the required jobs in this workflow.
  # Documentation remains an independent required workflow.
  ci-gate:
    name: CI Gate
    if: ${{ always() }}
    needs:
      - dev
      - gcc
      - hooks-backstop
      - quality
      - macos
      - windows
      - bench
    runs-on: ubuntu-24.04
    steps:
      - name: Require successful CI jobs
        run: |
          test "${{ needs.dev.result }}" = success
          test "${{ needs.gcc.result }}" = success
          test "${{ needs.hooks-backstop.result }}" = success
          test "${{ needs.quality.result }}" = success
          test "${{ needs.macos.result }}" = success
          test "${{ needs.windows.result }}" = success
          test "${{ needs.bench.result }}" = success
