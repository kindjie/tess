name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_CXX_COMPILER_LAUNCHER: ccache
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  dev:
    name: Dev Build And Tests
    runs-on: ubuntu-24.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ccache
          key: ccache-dev-${{ github.sha }}
          restore-keys: ccache-dev-

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
          ccache --version

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

      - name: Install smoke
        run: tools/install_smoke.sh

  # Minimal GCC portability gate: compile only (no tests/analysis/smoke).
  # GCC's stricter two-phase name lookup catches header portability breaks
  # that Clang and MSVC accept. Advisory during shake-out (continue-on-error)
  # because the project has not been built with GCC before; flip to required
  # by removing continue-on-error after two consecutive green main runs
  # (criterion set 2026-07-07; check the run history before flipping).
  gcc:
    name: GCC Compile
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      CC: gcc
      CXX: g++
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ccache
          key: ccache-gcc-${{ github.sha }}
          restore-keys: ccache-gcc-

      - name: Show tool versions
        run: |
          cmake --version
          g++ --version

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

  hooks-backstop:
    name: Hook Backstop Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        run: pipx install uv==0.11.26

      - name: Show tool versions
        run: |
          uv --version
          uv run --frozen --group dev clang-format --version

      - name: Repository hook checks
        run: uv run --frozen --group dev python tools/git_hooks.py ci

      - name: Hook unit tests
        run: >-
          uv run --frozen --group dev pytest
          tests/test_git_hooks.py
          tests/test_benchmark_tools.py
          tests/test_check_public_surface.py

      # Failing gate (promoted 2026-07-07 after a clean shake-out):
      # public symbols must be documented in a maintained architecture
      # doc and listed in docs/architecture/surface.json.
      - name: Public surface manifest
        run: uv run --frozen --group dev python tools/check_public_surface.py

  quality:
    name: Quality Gates (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev-werror
          - dev-asan
          - dev-tsan
          - dev-cppcheck
          - dev-clang-tidy
          - release
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ccache
          key: ccache-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.preset }}-

      - name: Install analysis tools
        if: matrix.preset == 'dev-cppcheck' || matrix.preset == 'dev-clang-tidy'
        run: |
          sudo apt-get update || true
          sudo apt-get install -y clang-tidy cppcheck

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
          if command -v clang-tidy >/dev/null; then clang-tidy --version; fi
          if command -v cppcheck >/dev/null; then cppcheck --version; fi

      - name: Configure
        run: cmake --preset "${{ matrix.preset }}"

      - name: Build
        run: cmake --build --preset "${{ matrix.preset }}"

      - name: Test
        if: >-
          matrix.preset == 'dev-werror' ||
          matrix.preset == 'dev-asan' ||
          matrix.preset == 'dev-tsan' ||
          matrix.preset == 'release'
        run: ctest --preset "${{ matrix.preset }}"

  advisory:
    name: Advisory Checks (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev-clang-tidy-advisory
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ccache
          key: ccache-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.preset }}-

      - name: Install analysis tools
        run: |
          sudo apt-get update || true
          sudo apt-get install -y clang-tidy

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
          clang-tidy --version

      - name: Configure
        run: cmake --preset "${{ matrix.preset }}"

      - name: Build
        run: cmake --build --preset "${{ matrix.preset }}"

  # No benchmark gates on macOS: bench/thresholds/*.json ceilings are
  # calibrated against the Linux ubuntu-24.04 runner family and would
  # misfire on Apple Silicon runners.
  macos:
    name: macOS Build And Tests (${{ matrix.preset }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev
          - dev-asan
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ccache
          key: ccache-macos-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-macos-${{ matrix.preset }}-

      - name: Install ccache
        run: brew install ccache

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
          ccache --version

      - name: Configure
        run: cmake --preset "${{ matrix.preset }}"

      - name: Build
        run: cmake --build --preset "${{ matrix.preset }}"

      - name: Test
        run: ctest --preset "${{ matrix.preset }}"

      - name: Install smoke
        if: matrix.preset == 'dev'
        run: tools/install_smoke.sh

  # The Visual Studio generator ignores compiler launchers, so the
  # workflow-level ccache env vars are inert here.
  windows:
    # Required gate since two consecutive green main runs (2026-07-07).
    # MSVC warnings (for example C4702) are not yet errors; enable
    # TESS_WARNINGS_AS_ERRORS here once the warning backlog is cleared.
    name: Windows MSVC
    runs-on: windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Show tool versions
        run: cmake --version

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build
        run: cmake --build --preset windows-msvc

      - name: Test
        run: ctest --preset windows-msvc

      - name: Install smoke
        shell: bash
        env:
          TESS_INSTALL_SMOKE_BUILD_DIR: >-
            ${{ github.workspace }}/build/windows-msvc
          TESS_INSTALL_SMOKE_CONFIG: Debug
        run: tools/install_smoke.sh

  bench:
    name: Benchmark Gates
    runs-on: ubuntu-24.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install ccache
        run: (sudo apt-get update || true) && sudo apt-get install -y ccache

      - name: Restore compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ccache
          key: ccache-bench-${{ github.sha }}
          restore-keys: ccache-bench-

      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version

      - name: Configure
        run: cmake --preset bench

      - name: Build
        run: cmake --build --preset bench

      - name: Test
        run: ctest --preset bench

      - name: Key benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_key_thresholds

      - name: Storage benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_storage_thresholds

      - name: Block benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_block_thresholds

      - name: Queued benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_queued_thresholds

      - name: Path benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_path_thresholds

      - name: Topology benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_topology_thresholds

      - name: Diagnostics benchmark thresholds
        run: cmake --build --preset bench --target tess_bench_diagnostics_thresholds

      - name: Collect non-gating benchmark baselines
        run: cmake --build --preset bench --target tess_bench_ci_baselines

      - name: Write benchmark artifact metadata
        run: |
          tools/benchmark_artifact_metadata.py \
            --out build/bench/bench/ci-baselines/metadata.json

      - name: Upload benchmark baseline artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-baselines-${{ github.run_id }}
          path: build/bench/bench/ci-baselines/*.json
          retention-days: 30
