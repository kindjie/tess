name: Bug report
description: Report a reproducible problem in tess.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to prepare a focused report.
  - type: input
    id: version
    attributes:
      label: tess version
      description: Release tag or commit SHA.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, compiler version, CMake version, and package path.
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproduction
      description: Include the smallest code and commands that reproduce it.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
